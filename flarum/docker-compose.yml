version: "3.8"

services:
  flarum:
    image: ghcr.io/mondedie/flarum:latest
    container_name: chinaconnect-flarum
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
      - ./assets:/var/www/html/assets
    depends_on:
      flarum-db:
        condition: service_healthy
    environment:
      - DEBUG=false
    networks:
      - flarum-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  flarum-db:
    image: mysql:8.0
    container_name: chinaconnect-flarum-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - flarum-mysql-data:/var/lib/mysql
    networks:
      - flarum-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=512M

  redis:
    image: redis:7-alpine
    container_name: chinaconnect-flarum-redis
    restart: always
    networks:
      - flarum-net
    volumes:
      - flarum-redis-data:/data

networks:
  flarum-net:
    driver: bridge

volumes:
  flarum-mysql-data:
  flarum-redis-data: