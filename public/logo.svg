<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="red3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg3)"/>

  <!-- Big stylized 'C' with paper-cut cloud + globe meridians -->
  <g transform="translate(256,200)">
    <!-- Globe meridians (subtle) -->
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="60" ry="120" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#ffffff" stroke-width="2" opacity="0.15"/>

    <!-- Big 'C' in red gradient, with cloud cutouts -->
    <path d="M 80 -100 A 130 130 0 1 0 80 100 L 50 80 A 95 95 0 1 1 50 -80 Z"
          fill="url(#red3)"/>
    <!-- Paper-cut cloud accent (white) inside the C opening -->
    <path d="M -40 0 Q -50 -15 -30 -20 Q -20 -30 -10 -20 Q 0 -30 10 -20 Q 25 -15 20 0 Q 25 15 10 20 Q 0 30 -10 20 Q -20 30 -30 20 Q -50 15 -40 0 Z"
          fill="#ffffff" opacity="0.95"/>
    <!-- Small accent dot (gold) -->
    <circle cx="60" cy="-100" r="14" fill="#f0c040"/>
  </g>

  <!-- Wordmark -->
  <text x="256" y="380" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="800" letter-spacing="-1">
    <tspan fill="#ffffff">China</tspan><tspan fill="#f0c040">Connect</tspan>
  </text>
  <text x="256" y="425" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="6">
    GLOBAL · LOCAL · CONNECTED
  </text>
</svg>
