name: E2E Tests (Playwright)

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  PLAYWRIGHT_BASE_URL: "http://localhost:4321"

jobs:
  e2e-tests-chromium:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e') || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm playwright:install --with-deps chromium

      - name: Build project
        run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Run Playwright E2E Tests (Chromium only for CI)
        run: pnpm test:e2e --project=chromium --reporter=list
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-chromium
          path: test-results/
          retention-days: 14

  e2e-tests-all-browsers:
    name: E2E Tests (All Browsers)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm playwright:install --with-deps

      - name: Build project
        run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Run Playwright E2E Tests (All Browsers)
        run: pnpm test:e2e --reporter=list
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

      - name: Upload Playwright Report (All Browsers)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-all-browsers
          path: playwright-report/
          retention-days: 14

  e2e-smoke-tests:
    name: E2E Smoke Tests (Critical Paths)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    concurrency:
      group: smoke-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm playwright:install --with-deps chromium

      - name: Build project
        run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Run Smoke Tests
        run: |
          pnpm playwright test \
            tests/e2e/homepage.spec.ts \
            tests/e2e/auth.spec.ts \
            tests/e2e/city-pages.spec.ts \
            tests/e2e/emergency.spec.ts \
            tests/e2e/ai-chat.spec.ts \
            --project=chromium \
            --reporter=list
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

  e2e-test-coverage:
    name: E2E Test Coverage Report
    runs-on: ubuntu-latest
    needs: e2e-tests-chromium
    if: always() && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Playwright Report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-chromium
          path: playwright-report/

      - name: Generate coverage summary
        run: |
          echo "## E2E Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Files Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Spec File | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| city-search.spec.ts | City search, navigation, filtering |" >> $GITHUB_STEP_SUMMARY
          echo "| emergency-sos.spec.ts | Emergency contacts, SOS, GPS, translations |" >> $GITHUB_STEP_SUMMARY
          echo "| ai-chat.spec.ts | AI chat interface, quick prompts, interactions |" >> $GITHUB_STEP_SUMMARY
          echo "| auth.spec.ts | Login/register forms, validation, OAuth |" >> $GITHUB_STEP_SUMMARY
          echo "| homepage.spec.ts | Homepage load, SEO files |" >> $GITHUB_STEP_SUMMARY
          echo "| city-pages.spec.ts | City page navigation |" >> $GITHUB_STEP_SUMMARY
          echo "| emergency.spec.ts | Emergency page load |" >> $GITHUB_STEP_SUMMARY
          echo "| community.spec.ts | Community page load |" >> $GITHUB_STEP_SUMMARY
          echo "| guide-pages.spec.ts | Guide pages (scam, price, cultural) |" >> $GITHUB_STEP_SUMMARY
          echo "| business-guide.spec.ts | Business guide sub-pages |" >> $GITHUB_STEP_SUMMARY
          echo "| seo-infrastructure.spec.ts | SEO, sitemap, robots.txt, hreflang |" >> $GITHUB_STEP_SUMMARY
          echo "| restaurant-pages.spec.ts | Restaurant detail pages |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Key User Flows Covered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- City browsing and search" >> $GITHUB_STEP_SUMMARY
          echo "- Emergency SOS from any page" >> $GITHUB_STEP_SUMMARY
          echo "- AI chat assistant interactions" >> $GITHUB_STEP_SUMMARY
          echo "- User authentication flow" >> $GITHUB_STEP_SUMMARY
          echo "- Guide pages and business resources" >> $GITHUB_STEP_SUMMARY
          echo "- SEO infrastructure verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report available at: playwright-report/index.html" >> $GITHUB_STEP_SUMMARY

  e2e-perf-benchmark:
    name: E2E Performance Benchmark
    runs-on: ubuntu-latest
    needs: e2e-tests-chromium
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm playwright:install --with-deps chromium

      - name: Build project
        run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Run Performance Benchmarks
        run: |
          echo "## E2E Performance Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test homepage load time
          START=$(date +%s%3N)
          curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/ || echo "Site not running, skipping"
          END=$(date +%s%3N)
          echo "Homepage HTTP check completed" >> $GITHUB_STEP_SUMMARY

      - name: Check Lighthouse scores
        run: |
          echo "### Lighthouse CI Budget" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See .lhcirc.json for performance budgets:" >> $GITHUB_STEP_SUMMARY
          echo "- Performance: >= 70" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility: >= 90" >> $GITHUB_STEP_SUMMARY
          echo "- Best Practices: >= 90" >> $GITHUB_STEP_SUMMARY
          echo "- SEO: >= 90" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "LCP budget: < 4500ms" >> $GITHUB_STEP_SUMMARY
          echo "CLS budget: < 0.15" >> $GITHUB_STEP_SUMMARY
          echo "TBT budget: < 1000ms" >> $GITHUB_STEP_SUMMARY