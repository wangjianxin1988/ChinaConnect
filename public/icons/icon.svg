<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring - compass base -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#grad1)" stroke-width="8" filter="url(#glow)"/>
  
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad2)" stroke-width="3"/>
  
  <!-- Compass needle - North (blue) -->
  <polygon points="256,96 244,256 268,256" fill="#3B82F6" opacity="0.8"/>
  
  <!-- Compass needle - South (purple) -->
  <polygon points="256,416 244,256 268,256" fill="#8B5CF6" opacity="0.8"/>
  
  <!-- Compass needle - East -->
  <polygon points="416,256 256,244 256,268" fill="#60A5FA" opacity="0.7"/>
  
  <!-- Compass needle - West -->
  <polygon points="96,256 256,244 256,268" fill="#A78BFA" opacity="0.7"/>
  
  <!-- Center gradient circle -->
  <circle cx="256" cy="256" r="30" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Center bright dot -->
  <circle cx="256" cy="256" r="8" fill="white" opacity="0.95"/>
  
  <!-- Cardinal point nodes -->
  <circle cx="256" cy="61" r="10" fill="#3B82F6" opacity="0.85"/>
  <circle cx="256" cy="451" r="10" fill="#8B5CF6" opacity="0.85"/>
  <circle cx="451" cy="256" r="10" fill="#60A5FA" opacity="0.8"/>
  <circle cx="61" cy="256" r="10" fill="#A78BFA" opacity="0.8"/>
  
  <!-- Bridge arch (East-West connection) -->
  <path d="M 116 310 Q 256 150 396 310" fill="none" stroke="url(#grad1)" stroke-width="4" opacity="0.6"/>
  
  <!-- Tick marks around outer ring -->
  <g stroke="url(#grad1)" stroke-width="1.5" opacity="0.7">
    <line x1="256" y1="21" x2="256" y2="41"/>
    <line x1="359" y1="33" x2="352" y2="52"/>
    <line x1="441" y1="71" x2="425" y2="86"/>
    <line x1="489" y1="153" x2="471" y2="160"/>
    <line x1="491" y1="256" x2="471" y2="256"/>
    <line x1="489" y1="359" x2="471" y2="352"/>
    <line x1="441" y1="441" x2="425" y2="425"/>
    <line x1="359" y1="489" x2="352" y2="471"/>
    <line x1="256" y1="491" x2="256" y2="471"/>
    <line x1="153" y1="489" x2="160" y2="471"/>
    <line x1="71" y1="441" x2="86" y2="425"/>
    <line x1="23" y1="359" x2="41" y2="352"/>
    <line x1="21" y1="256" x2="41" y2="256"/>
    <line x1="23" y1="153" x2="41" y2="160"/>
    <line x1="71" y1="71" x2="86" y2="86"/>
    <line x1="153" y1="33" x2="160" y2="52"/>
  </g>
  
  <!-- Larger tick marks at cardinal points -->
  <g stroke="url(#grad1)" stroke-width="3" opacity="0.8">
    <line x1="256" y1="21" x2="256" y2="51"/>
    <line x1="491" y1="256" x2="461" y2="256"/>
    <line x1="256" y1="491" x2="256" y2="461"/>
    <line x1="21" y1="256" x2="51" y2="256"/>
  </g>
</svg>
