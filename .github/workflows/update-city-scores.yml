name: Update City Scores

on:
  # Weekly on Monday at 2am UTC (10am Beijing)
  schedule:
    - cron: '0 2 * * 1'
  # Manual trigger
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run city scores update
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/init-city-scores.mjs
