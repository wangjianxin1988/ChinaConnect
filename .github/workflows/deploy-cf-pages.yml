name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CLOUDFLARE_PROJECT_NAME: chinaconnect

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_MINIMAX_API_KEY: ${{ secrets.PUBLIC_MINIMAX_API_KEY }}
          PUBLIC_MINIMAX_BASE_URL: ${{ secrets.PUBLIC_MINIMAX_BASE_URL }}
          VITE_ANYSEARCH_API_KEY: ${{ secrets.VITE_ANYSEARCH_API_KEY }}
      - run: npm install -g wrangler@latest
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=main
