<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background fill for maskable -->
  <rect width="512" height="512" fill="#3B82F6"/>
  
  <!-- Content centered in safe zone (80% of image) -->
  <g transform="translate(256,256) scale(0.65) translate(-256,-256)">
    <!-- Outer ring -->
    <circle cx="256" cy="256" r="220" fill="none" stroke="white" stroke-width="8"/>
    
    <!-- Inner ring -->
    <circle cx="256" cy="256" r="180" fill="none" stroke="white" stroke-width="3" opacity="0.7"/>
    
    <!-- Compass needle - North -->
    <polygon points="256,96 244,256 268,256" fill="white" opacity="0.9"/>
    
    <!-- Compass needle - South -->
    <polygon points="256,416 244,256 268,256" fill="white" opacity="0.6"/>
    
    <!-- Compass needle - East -->
    <polygon points="416,256 256,244 256,268" fill="white" opacity="0.8"/>
    
    <!-- Compass needle - West -->
    <polygon points="96,256 256,244 256,268" fill="white" opacity="0.5"/>
    
    <!-- Center circle -->
    <circle cx="256" cy="256" r="30" fill="white" opacity="0.9"/>
    
    <!-- Center dot -->
    <circle cx="256" cy="256" r="8" fill="#3B82F6"/>
    
    <!-- Cardinal nodes -->
    <circle cx="256" cy="61" r="10" fill="white"/>
    <circle cx="256" cy="451" r="10" fill="white" opacity="0.7"/>
    <circle cx="451" cy="256" r="10" fill="white" opacity="0.8"/>
    <circle cx="61" cy="256" r="10" fill="white" opacity="0.6"/>
    
    <!-- Bridge arch -->
    <path d="M 116 310 Q 256 150 396 310" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>
  </g>
</svg>
